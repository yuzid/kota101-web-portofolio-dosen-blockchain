# docker-compose.yml - DEVELOPMENT ENVIRONMENT
# Untuk development lokal dengan database PostgreSQL lokal
# Untuk production dengan Amazon RDS, gunakan docker-compose.prod.yml

services:
  # Database Off-Chain Relasional
  postgres_db:
    image: postgres:15-alpine
    container_name: jtk_portfolio_db
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: portfolio_blockchain_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


  # Jaringan Blockchain Node (MultiChain Placeholder / Simulation Service)
  multichain_node:
    image: ubuntu:latest
    container_name: jtk_blockchain_node
    command: tail -f /dev/null # Placeholder agar kontainer tetap hidup menirukan node RPC
    ports:
      - "4242:4242"

  # Backend Server API
  server:
    build: ./server
    container_name: jtk_portfolio_server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres_db
      - DB_USER=portfolio_user
      - DB_PASSWORD=secretpassword
      - DB_NAME=portfolio_blockchain_db
      - MULTICHAIN_RPC_URL=http://multichain_node:4242
      - AWS_S3_BUCKET=dosen-portfolio-bucket
    depends_on:
      - postgres_db
      - multichain_node

  # Frontend Client Application
  client:
    build: ./client
    container_name: jtk_portfolio_client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata: