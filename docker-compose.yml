# docker-compose.yml - MONOLITHIC DEVELOPMENT ENVIRONMENT

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: jtk_portfolio_db
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: portfolio_blockchain_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ← TAMBAHAN: healthcheck agar app tunggu DB siap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_blockchain_db"]
      interval: 5s
      timeout: 5s
      retries: 10



  app:
    build: .
    container_name: jtk_portfolio_app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DB_HOST=postgres_db
      - DB_USER=portfolio_user
      - DB_PASSWORD=secretpassword
      - DB_NAME=portfolio_blockchain_db
      # ← TAMBAHAN: DATABASE_URL untuk Prisma
      - DATABASE_URL=postgresql://portfolio_user:secretpassword@postgres_db:5432/portfolio_blockchain_db
      - MULTICHAIN_RPC_URL=http://multichain_node:4242
      - AWS_S3_BUCKET=dosen-portfolio-bucket
    depends_on:
      # ← DIUBAH: tunggu sampai postgres_db healthy
      postgres_db:
        condition: service_healthy


volumes:
  pgdata: