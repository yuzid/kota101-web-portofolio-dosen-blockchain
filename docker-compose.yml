services:
  postgres_db:
    image: postgres:16-alpine
    container_name: jtk_portfolio_db
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: portfolio_blockchain_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_blockchain_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: jtk_portfolio_app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://portfolio_user:secretpassword@postgres_db:5432/portfolio_blockchain_db
      - MULTICHAIN_RPC_URL=http://multichain_node:4242
      - AWS_S3_BUCKET=dosen-portfolio-bucket
      - JWT_SECRET=your-super-secret-key-change-this-in-production
      - ADMIN_EMAIL=admin@university.ac.id
      - ADMIN_PASSWORD=AdminPassword123
      - ADMIN_NAME=Administrator
    depends_on:
      postgres_db:
        condition: service_healthy

volumes:
  pgdata: