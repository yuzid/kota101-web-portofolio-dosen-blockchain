name: Deploy to AWS ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-southeast-1                  
  ECR_REPOSITORY: portofolio-server
  ECS_CLUSTER: portofolio-cluster
  ECS_SERVICE: portofolio-server-service

jobs:
  deploy:
    name: Build & Deploy Monolith
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # ---- BUILD IMAGE MENGGUNAKAN DOCKERFILE ROOT ----
    - name: Build, Tag, and Push Monolith Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest .
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

    # ---- PAKSA ECS RESTART DENGAN IMAGE LATEST BARU ----
    - name: Force New Deployment ECS Service
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}