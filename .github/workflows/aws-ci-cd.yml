name: Deploy to AWS ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-southeast-1                  
  ECR_REPOSITORY_SERVER: portofolio-server
  ECR_REPOSITORY_CLIENT: portofolio-client
  ECS_CLUSTER: portofolio-cluster
  # ---- PERUBAHAN DI SINI (DIPECAH JADI 2) ----
  ECS_SERVER_SERVICE: portofolio-server-service
  ECS_CLIENT_SERVICE: portofolio-client-service
  ECS_SERVER_TASK_DEFINITION: .aws/server-task-definition.json 
  ECS_CLIENT_TASK_DEFINITION: .aws/client-task-definition.json 

jobs:
  deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest
    environment: AWS

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # ---- INJECT AWS ACCOUNT ID KE MASING-MASING JSON ----
    - name: Inject AWS Account ID Placeholder
      run: |
        sed -i 's/YOUR_AWS_ACCOUNT_ID/${{ secrets.AWS_ACCOUNT_ID }}/g' ${{ env.ECS_SERVER_TASK_DEFINITION }}
        sed -i 's/YOUR_AWS_ACCOUNT_ID/${{ secrets.AWS_ACCOUNT_ID }}/g' ${{ env.ECS_CLIENT_TASK_DEFINITION }}

    # ---- BUILD & PUSH BACKEND SERVER ----
    - name: Build, Tag, and Push Server Image to Amazon ECR
      id: build-image-server
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_SERVER }}:$IMAGE_TAG ./server
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_SERVER }}:$IMAGE_TAG
        echo "server_image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY_SERVER }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # ---- BUILD & PUSH FRONTEND CLIENT ----
    - name: Build, Tag, and Push Client Image to Amazon ECR
      id: build-image-client
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_CLIENT }}:$IMAGE_TAG ./client
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_CLIENT }}:$IMAGE_TAG
        echo "client_image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY_CLIENT }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # ==========================================
    # ---- ALUR DEPLOY BACKEND (SERVER) --------
    # ==========================================
    - name: Fill in the new server image ID in the Amazon ECS task definition
      id: render-server
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_SERVER_TASK_DEFINITION }}
        container-name: portfolio-server-container
        image: ${{ steps.build-image-server.outputs.server_image }}

    - name: Deploy Amazon ECS Server Task Definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.render-server.outputs.task-definition }}
        service: ${{ env.ECS_SERVER_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    # ==========================================
    # ---- ALUR DEPLOY FRONTEND (CLIENT) -------
    # ==========================================
    - name: Fill in the new client image ID in the Amazon ECS task definition
      id: render-client
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_CLIENT_TASK_DEFINITION }}
        container-name: portfolio-client-container
        image: ${{ steps.build-image-client.outputs.client_image }}

    - name: Deploy Amazon ECS Client Task Definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.render-client.outputs.task-definition }}
        service: ${{ env.ECS_CLIENT_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true