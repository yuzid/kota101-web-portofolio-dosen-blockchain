name: CI/CD Pipeline Monolith Portal
on:
  push:
    branches:
      - main
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: portofolio-server
  ECS_CLUSTER: portofolio-cluster
  ECS_SERVICE: portofolio-server-service
  ECS_TASK_DEFINITION_NAME: portfolio-server-task
  CONTAINER_NAME: portfolio-server-container

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: AWS
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download, Clean, and Inject Environment Variables into Task Definition
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
        CONTAINER: ${{ env.CONTAINER_NAME }}
      run: |
        # 1. Unduh task definition asli dari AWS ECS
        aws ecs describe-task-definition \
          --task-definition ${{ env.ECS_TASK_DEFINITION_NAME }} \
          --query taskDefinition > raw-task-def.json

        # 2. Hapus semua metadata read-only AWS AND bersihkan nilai variabel lama sebelum melakukan append
        jq --arg container "$CONTAINER" \
           --arg jwt "$JWT_SECRET" \
           --arg email "$ADMIN_EMAIL" \
           --arg password "$ADMIN_PASSWORD" \
           --arg name "$ADMIN_NAME" \
           'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection) |
            (.containerDefinitions[] | select(.name == $container) | .environment) |= 
            (map(select(.name | . != "JWT_SECRET" and . != "ADMIN_EMAIL" and . != "ADMIN_PASSWORD" and . != "ADMIN_NAME")) + [
              {"name": "JWT_SECRET",      "value": $jwt},
              {"name": "ADMIN_EMAIL",     "value": $email},
              {"name": "ADMIN_PASSWORD",  "value": $password},
              {"name": "ADMIN_NAME",      "value": $name}
            ])' raw-task-def.json > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true