name: CI/CD Pipeline Monolith Portal
on:
  push:
    branches:
      - main
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: portofolio-server
  ECS_CLUSTER: portofolio-cluster
  ECS_SERVICE: portofolio-server-service
  ECS_TASK_DEFINITION_NAME: portfolio-server-task
  CONTAINER_NAME: portfolio-server-container

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: AWS
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
      run: |
        # Inject environment variables ke frontend menggunakan --build-arg saat build-time
        docker build \
          --build-arg VITE_GOOGLE_CLIENT_ID="$VITE_GOOGLE_CLIENT_ID" \
          --build-arg VITE_API_URL="$VITE_API_URL" \
          -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download, Clean, and Inject Environment Variables into Task Definition
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        CONTAINER: ${{ env.CONTAINER_NAME }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        AWS_REGION: ${{ env.AWS_REGION }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AUDIT_STREAM_NAME: ${{ secrets.AUDIT_STREAM_NAME }}
        CHAIN_NAME: ${{ secrets.CHAIN_NAME }}
        MULTICHAIN_RPC_URL: ${{ secrets.MULTICHAIN_RPC_URL }}
        MULTICHAIN_N1_IP: ${{ secrets.MULTICHAIN_N1_IP }}
        MULTICHAIN_N1_RPC_PORT: ${{ secrets.MULTICHAIN_N1_RPC_PORT }}
        MULTICHAIN_N1_RPC_USERNAME: ${{ secrets.MULTICHAIN_N1_RPC_USERNAME }}
        MULTICHAIN_N1_RPC_PASSWORD: ${{ secrets.MULTICHAIN_N1_RPC_PASSWORD }}
        MULTICHAIN_N2_IP: ${{ secrets.MULTICHAIN_N2_IP }}
        MULTICHAIN_N2_RPC_PORT: ${{ secrets.MULTICHAIN_N2_RPC_PORT }}
        MULTICHAIN_N2_RPC_USERNAME: ${{ secrets.MULTICHAIN_N2_RPC_USERNAME }}
        MULTICHAIN_N2_RPC_PASSWORD: ${{ secrets.MULTICHAIN_N2_RPC_PASSWORD }}
        MULTICHAIN_N3_IP: ${{ secrets.MULTICHAIN_N3_IP }}
        MULTICHAIN_N3_RPC_PORT: ${{ secrets.MULTICHAIN_N3_RPC_PORT }}
        MULTICHAIN_N3_RPC_USERNAME: ${{ secrets.MULTICHAIN_N3_RPC_USERNAME }}
        MULTICHAIN_N3_RPC_PASSWORD: ${{ secrets.MULTICHAIN_N3_RPC_PASSWORD }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
      run: |
        # 1. Unduh task definition asli dari AWS ECS
        aws ecs describe-task-definition \
          --task-definition ${{ env.ECS_TASK_DEFINITION_NAME }} \
          --query taskDefinition > raw-task-def.json

        # 2. Hapus metadata read-only AWS dan injeksikan variabel runtime
        jq --arg container "$CONTAINER" \
           --arg jwt "$JWT_SECRET" \
           --arg email "$ADMIN_EMAIL" \
           --arg password "$ADMIN_PASSWORD" \
           --arg name "$ADMIN_NAME" \
           --arg google_id "$GOOGLE_CLIENT_ID" \
           --arg database_url "$DATABASE_URL" \
           --arg s3_bucket "$AWS_S3_BUCKET" \
           --arg aws_region "$AWS_REGION" \
           --arg aws_access_key "$AWS_ACCESS_KEY_ID" \
           --arg aws_secret_key "$AWS_SECRET_ACCESS_KEY" \
           --arg audit_stream "$AUDIT_STREAM_NAME" \
           --arg chain_name "$CHAIN_NAME" \
           --arg multichain_rpc_url "$MULTICHAIN_RPC_URL" \
           --arg n1_ip "$MULTICHAIN_N1_IP" \
           --arg n1_port "$MULTICHAIN_N1_RPC_PORT" \
           --arg n1_user "$MULTICHAIN_N1_RPC_USERNAME" \
           --arg n1_pass "$MULTICHAIN_N1_RPC_PASSWORD" \
           --arg n2_ip "$MULTICHAIN_N2_IP" \
           --arg n2_port "$MULTICHAIN_N2_RPC_PORT" \
           --arg n2_user "$MULTICHAIN_N2_RPC_USERNAME" \
           --arg n2_pass "$MULTICHAIN_N2_RPC_PASSWORD" \
           --arg n3_ip "$MULTICHAIN_N3_IP" \
           --arg n3_port "$MULTICHAIN_N3_RPC_PORT" \
           --arg n3_user "$MULTICHAIN_N3_RPC_USERNAME" \
           --arg n3_pass "$MULTICHAIN_N3_RPC_PASSWORD" \
           --arg smtp_host "$SMTP_HOST" \
           --arg smtp_port "$SMTP_PORT" \
           --arg smtp_secure "$SMTP_SECURE" \
           --arg smtp_user "$SMTP_USER" \
           --arg smtp_pass "$SMTP_PASS" \
           --arg smtp_from "$SMTP_FROM" \
           'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection) |
            (.containerDefinitions[] | select(.name == $container) | .environment) |=
            (map(select(.name | . != "JWT_SECRET" and . != "ADMIN_EMAIL" and . != "ADMIN_PASSWORD" and . != "ADMIN_NAME" and . != "GOOGLE_CLIENT_ID" and . != "DATABASE_URL" and . != "AWS_S3_BUCKET" and . != "AWS_REGION" and . != "AWS_ACCESS_KEY_ID" and . != "AWS_SECRET_ACCESS_KEY" and . != "AUDIT_STREAM_NAME" and . != "CHAIN_NAME" and . != "MULTICHAIN_RPC_URL" and . != "MULTICHAIN_N1_IP" and . != "MULTICHAIN_N1_RPC_PORT" and . != "MULTICHAIN_N1_RPC_USERNAME" and . != "MULTICHAIN_N1_RPC_PASSWORD" and . != "MULTICHAIN_N2_IP" and . != "MULTICHAIN_N2_RPC_PORT" and . != "MULTICHAIN_N2_RPC_USERNAME" and . != "MULTICHAIN_N2_RPC_PASSWORD" and . != "MULTICHAIN_N3_IP" and . != "MULTICHAIN_N3_RPC_PORT" and . != "MULTICHAIN_N3_RPC_USERNAME" and . != "MULTICHAIN_N3_RPC_PASSWORD" and . != "SMTP_HOST" and . != "SMTP_PORT" and . != "SMTP_SECURE" and . != "SMTP_USER" and . != "SMTP_PASS" and . != "SMTP_FROM")) + [
              {"name": "JWT_SECRET",                  "value": $jwt},
              {"name": "ADMIN_EMAIL",                 "value": $email},
              {"name": "ADMIN_PASSWORD",              "value": $password},
              {"name": "ADMIN_NAME",                  "value": $name},
              {"name": "GOOGLE_CLIENT_ID",            "value": $google_id},
              {"name": "DATABASE_URL",                "value": $database_url},
              {"name": "AWS_S3_BUCKET",               "value": $s3_bucket},
              {"name": "AWS_REGION",                  "value": $aws_region},
              {"name": "AWS_ACCESS_KEY_ID",           "value": $aws_access_key},
              {"name": "AWS_SECRET_ACCESS_KEY",       "value": $aws_secret_key},
              {"name": "AUDIT_STREAM_NAME",           "value": $audit_stream},
              {"name": "CHAIN_NAME",                  "value": $chain_name},
              {"name": "MULTICHAIN_RPC_URL",          "value": $multichain_rpc_url},
              {"name": "MULTICHAIN_N1_IP",            "value": $n1_ip},
              {"name": "MULTICHAIN_N1_RPC_PORT",      "value": $n1_port},
              {"name": "MULTICHAIN_N1_RPC_USERNAME",  "value": $n1_user},
              {"name": "MULTICHAIN_N1_RPC_PASSWORD",  "value": $n1_pass},
              {"name": "MULTICHAIN_N2_IP",            "value": $n2_ip},
              {"name": "MULTICHAIN_N2_RPC_PORT",      "value": $n2_port},
              {"name": "MULTICHAIN_N2_RPC_USERNAME",  "value": $n2_user},
              {"name": "MULTICHAIN_N2_RPC_PASSWORD",  "value": $n2_pass},
              {"name": "MULTICHAIN_N3_IP",            "value": $n3_ip},
              {"name": "MULTICHAIN_N3_RPC_PORT",      "value": $n3_port},
              {"name": "MULTICHAIN_N3_RPC_USERNAME",  "value": $n3_user},
              {"name": "MULTICHAIN_N3_RPC_PASSWORD",  "value": $n3_pass},
              {"name": "SMTP_HOST",                   "value": $smtp_host},
              {"name": "SMTP_PORT",                   "value": $smtp_port},
              {"name": "SMTP_SECURE",                 "value": $smtp_secure},
              {"name": "SMTP_USER",                   "value": $smtp_user},
              {"name": "SMTP_PASS",                   "value": $smtp_pass},
              {"name": "SMTP_FROM",                   "value": $smtp_from}
            ])' raw-task-def.json > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
