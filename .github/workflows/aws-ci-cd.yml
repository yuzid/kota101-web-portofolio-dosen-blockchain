name: Deploy Monolith to AWS ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-southeast-1                  
  ECR_REPOSITORY: portofolio-server
  ECS_CLUSTER: portofolio-cluster
  ECS_SERVICE: portofolio-app-service
  ECS_TASK_DEFINITION: .aws/server-task-definition.json

jobs:
  deploy:
    name: Build & Deploy Monolith
    runs-on: ubuntu-latest
    environment: AWS

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Inject Secrets into Task Definition
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        sed -i 's/AWS_ACCOUNT_ID/${{ secrets.AWS_ACCOUNT_ID }}/g' ${{ env.ECS_TASK_DEFINITION }}
        sed -i 's/IMAGE_TAG_PLACEHOLDER/$IMAGE_TAG/g' ${{ env.ECS_TASK_DEFINITION }}
        sed -i 's|DB_HOST_PLACEHOLDER|${{ secrets.DB_HOST }}|g' ${{ env.ECS_TASK_DEFINITION }}
        sed -i 's|DB_USER_PLACEHOLDER|${{ secrets.DB_USER }}|g' ${{ env.ECS_TASK_DEFINITION }}
        sed -i 's|DB_PASSWORD_PLACEHOLDER|${{ secrets.DB_PASSWORD }}|g' ${{ env.ECS_TASK_DEFINITION }}
        sed -i 's|DB_NAME_PLACEHOLDER|${{ secrets.DB_NAME }}|g' ${{ env.ECS_TASK_DEFINITION }}
        sed -i 's|MULTICHAIN_RPC_URL_PLACEHOLDER|${{ secrets.MULTICHAIN_RPC_URL }}|g' ${{ env.ECS_TASK_DEFINITION }}
        sed -i 's|AWS_S3_BUCKET_PLACEHOLDER|${{ secrets.AWS_S3_BUCKET }}|g' ${{ env.ECS_TASK_DEFINITION }}

    # ---- BUILD IMAGE (TAG GITHUB SHA ONLY) ----
    - name: Build, Tag, and Push Monolith Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build image dengan tag commit SHA
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
        
        # Push image ke AWS ECR
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

    # ---- PAKSA ECS RESTART DENGAN IMAGE BARU ----
    - name: Force New Deployment ECS Service
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}