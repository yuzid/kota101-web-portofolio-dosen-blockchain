name: CI/CD Pipeline Monolith Portal
on:
  push:
    branches:
      - main
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: portofolio-server
  ECS_CLUSTER: portofolio-cluster
  ECS_SERVICE: portofolio-server-service
  ECS_TASK_DEFINITION_NAME: portfolio-server-task
  CONTAINER_NAME: portfolio-server-container

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: AWS
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
      run: |
        # Inject environment variables ke frontend menggunakan --build-arg saat build-time
        docker build \
          --build-arg VITE_GOOGLE_CLIENT_ID="$VITE_GOOGLE_CLIENT_ID" \
          --build-arg VITE_API_URL="$VITE_API_URL" \
          -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download, Clean, and Inject Environment Variables into Task Definition
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        CONTAINER: ${{ env.CONTAINER_NAME }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        AUDIT_STREAM_NAME: ${{ secrets.AUDIT_STREAM_NAME }}
        D3_IP: ${{ secrets.D3_IP }}
        D4_IP: ${{ secrets.D4_IP }}
        D3_RPC_PORT: ${{ secrets.D3_RPC_PORT }}
        D3_RPC_USERNAME: ${{ secrets.D3_RPC_USERNAME }}
        D3_RPC_PASSWORD: ${{ secrets.D3_RPC_PASSWORD }}
        D4_RPC_PORT: ${{ secrets.D4_RPC_PORT }}
        D4_RPC_USERNAME: ${{ secrets.D4_RPC_USERNAME }}
        D4_RPC_PASSWORD: ${{ secrets.D4_RPC_PASSWORD }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
      run: |
        # 1. Unduh task definition asli dari AWS ECS
        aws ecs describe-task-definition \
          --task-definition ${{ env.ECS_TASK_DEFINITION_NAME }} \
          --query taskDefinition > raw-task-def.json

        # 2. Hapus metadata read-only AWS dan injeksikan variabel runtime (termasuk GOOGLE_CLIENT_ID untuk backend)
        jq --arg container "$CONTAINER" \
           --arg jwt "$JWT_SECRET" \
           --arg email "$ADMIN_EMAIL" \
           --arg password "$ADMIN_PASSWORD" \
           --arg name "$ADMIN_NAME" \
           --arg google_id "$GOOGLE_CLIENT_ID" \
           --arg database_url "$DATABASE_URL" \
           --arg s3_bucket "$AWS_S3_BUCKET" \
           --arg audit_stream "$AUDIT_STREAM_NAME" \
           --arg d3_ip "$D3_IP" \
           --arg d4_ip "$D4_IP" \
           --arg d3_port "$D3_RPC_PORT" \
           --arg d3_user "$D3_RPC_USERNAME" \
           --arg d3_pass "$D3_RPC_PASSWORD" \
           --arg d4_port "$D4_RPC_PORT" \
           --arg d4_user "$D4_RPC_USERNAME" \
           --arg d4_pass "$D4_RPC_PASSWORD" \
           --arg aws_access_key "$AWS_ACCESS_KEY_ID" \
           --arg aws_secret_key "$AWS_SECRET_ACCESS_KEY" \           --arg smtp_host "$SMTP_HOST" 
           --arg smtp_port "$SMTP_PORT" 
           --arg smtp_secure "$SMTP_SECURE" 
           --arg smtp_user "$SMTP_USER" 
           --arg smtp_pass "$SMTP_PASS" 
           --arg smtp_from "$SMTP_FROM"            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection) |
            (.containerDefinitions[] | select(.name == $container) | .environment) |= 
            (map(select(.name | . != "JWT_SECRET" and . != "ADMIN_EMAIL" and . != "ADMIN_PASSWORD" and . != "ADMIN_NAME" and . != "GOOGLE_CLIENT_ID" and . != "DATABASE_URL" and . != "AWS_S3_BUCKET" and . != "AUDIT_STREAM_NAME" and . != "D3_IP" and . != "D4_IP" and . != "D3_RPC_PORT" and . != "D3_RPC_USERNAME" and . != "D3_RPC_PASSWORD" and . != "D4_RPC_PORT" and . != "D4_RPC_USERNAME" and . != "D4_RPC_PASSWORD" and . != "SMTP_HOST" and . != "SMTP_PORT" and . != "SMTP_SECURE" and . != "SMTP_USER" and . != "SMTP_PASS" and . != "SMTP_FROM")) + [
              {"name": "JWT_SECRET",       "value": $jwt},
              {"name": "ADMIN_EMAIL",      "value": $email},
              {"name": "ADMIN_PASSWORD",   "value": $password},
              {"name": "ADMIN_NAME",       "value": $name},
              {"name": "GOOGLE_CLIENT_ID", "value": $google_id},
              {"name": "DATABASE_URL", "value": $database_url},
              {"name": "AWS_S3_BUCKET", "value": $s3_bucket},
              {"name": "AUDIT_STREAM_NAME", "value": $audit_stream},
              {"name": "D3_IP", "value": $d3_ip},
              {"name": "D4_IP", "value": $d4_ip},
              {"name": "D3_RPC_PORT", "value": $d3_port},
              {"name": "D3_RPC_USERNAME", "value": $d3_user},
              {"name": "D3_RPC_PASSWORD", "value": $d3_pass},
              {"name": "D4_RPC_PORT", "value": $d4_port},
              {"name": "D4_RPC_USERNAME", "value": $d4_user},
              {"name": "D4_RPC_PASSWORD", "value": $d4_pass},
              {"name": "AWS_ACCESS_KEY_ID", "value": $aws_access_key},
              {"name": "AWS_SECRET_ACCESS_KEY", "value": $aws_secret_key},
              {"name": "SMTP_HOST", "value": $smtp_host},
              {"name": "SMTP_PORT", "value": $smtp_port},
              {"name": "SMTP_SECURE", "value": $smtp_secure},
              {"name": "SMTP_USER", "value": $smtp_user},
              {"name": "SMTP_PASS", "value": $smtp_pass},
              {"name": "SMTP_FROM", "value": $smtp_from}
            ])' raw-task-def.json > task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true